    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      stock-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      financial-service:
        condition: service_healthy
      logistics-service:
        condition: service_healthy
      audit-service:
