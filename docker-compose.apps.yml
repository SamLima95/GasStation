services:
  identity-service:
    image: gasstation/identity-service:local
    build:
      context: .
      dockerfile: packages/identity-service/Dockerfile
    environment:
      NODE_ENV: production
      IDENTITY_SERVICE_PORT: 3001
      IDENTITY_DATABASE_URL: "postgresql://lframework:lframework@postgres:5432/lframework_identity?connection_limit=5"
      REDIS_URL: "redis://redis:6379"
      RABBITMQ_URL: "amqp://lframework:lframework@rabbitmq:5672"
      JWT_SECRET: "local-docker-secret-min-32-chars-change"
      BASE_URL: "http://localhost:8080/identity"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "3001:3001"

  catalog-service:
    image: gasstation/catalog-service:local
