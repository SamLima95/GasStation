events {
    worker_connections 1024;
}

http {
    upstream identity {
        # Serviços rodando no host (pnpm run dev) ou host.docker.internal em Linux
        server host.docker.internal:3001;
    }

    upstream catalog {
        server host.docker.internal:3002;
    }

    upstream stock {
        server host.docker.internal:3004;
    }

    upstream orders {
        server host.docker.internal:3005;
    }

    upstream logistics {
        server host.docker.internal:3007;
    }

    upstream financial {
        server host.docker.internal:3006;
    }

    upstream audit {
        server host.docker.internal:3008;
    }

    upstream api_docs {
        server host.docker.internal:3003;
    }

    server {
        listen 80;
        server_name localhost;

        # Identity: /identity/*
        location /identity/ {
            proxy_pass http://identity/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Gateway "nginx" always;
        }

        # Catalog: /catalog/*
        location /catalog/ {
            proxy_pass http://catalog/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Gateway "nginx" always;
        }

        # Stock: /stock/*
        location /stock/ {
            proxy_pass http://stock/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Gateway "nginx" always;
        }

        # Orders: /orders/*
        location /orders/ {
            proxy_pass http://orders/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Gateway "nginx" always;
        }

        # Financial: /financial/*
        location /financial/ {
            proxy_pass http://financial/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Gateway "nginx" always;
        }

        # Logistics: /logistics/*
        location /logistics/ {
            proxy_pass http://logistics/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Gateway "nginx" always;
        }

        # Audit: /audit/*
        location /audit/ {
            proxy_pass http://audit/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Gateway "nginx" always;
        }

        # Swagger unificado: /api-docs/*
        location /api-docs/ {
            proxy_pass http://api_docs/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Gateway "nginx" always;
        }

        # Health do gateway
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        location / {
            return 404 '{"error":"Not Found","message":"Use /identity/, /catalog/, /stock/, /orders/, /financial/, /logistics/, /audit/ ou /api-docs/"}';
            add_header Content-Type application/json;
        }
    }
}
