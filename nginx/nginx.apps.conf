events {
    worker_connections 1024;
}

http {
    upstream identity {
        server identity-service:3001;
    }

    upstream catalog {
        server catalog-service:3002;
    }

    upstream stock {
        server stock-service:3004;
    }

    upstream orders {
        server order-service:3005;
    }

    upstream logistics {
        server logistics-service:3007;
    }

    upstream financial {
        server financial-service:3006;
    }

    upstream audit {
        server audit-service:3008;
    }

    upstream dashboard {
        server dashboard-service:3009;
    }

    server {
        listen 80;
        server_name localhost;

        location /identity/ {
            proxy_pass http://identity/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Gateway "nginx" always;
        }

        location /catalog/ {
            proxy_pass http://catalog/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Gateway "nginx" always;
        }

        location /stock/ {
            proxy_pass http://stock/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header X-Gateway "nginx" always;
        }

        location /orders/ {
            proxy_pass http://orders/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header X-Gateway "nginx" always;
        }

        location /financial/ {
            proxy_pass http://financial/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header X-Gateway "nginx" always;
        }

        location /logistics/ {
            proxy_pass http://logistics/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header X-Gateway "nginx" always;
        }

        location /audit/ {
            proxy_pass http://audit/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header X-Gateway "nginx" always;
        }

        location /dashboard/ {
            proxy_pass http://dashboard/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header X-Gateway "nginx" always;
        }

        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        location / {
            return 404 '{"error":"Not Found","message":"Use /identity/, /catalog/, /stock/, /orders/, /financial/, /logistics/, /audit/ ou /dashboard/"}';
            add_header Content-Type application/json;
        }
    }
}
